<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Chats [DEBUG V3]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 flex flex-col h-screen max-w-md mx-auto relative shadow-2xl overflow-hidden">

    <!-- Header -->
    <header
        class="bg-white p-4 flex items-center justify-between border-b border-gray-100 sticky top-0 z-10 transition-colors">
        <div class="flex items-center space-x-2">
            <div
                class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">
                Q
            </div>
            <h1 class="text-xl font-bold text-gray-800">QuickMsg</h1>
        </div>
        <div class="flex items-center space-x-6 text-gray-500 text-lg relative">
            <i class="fas fa-search cursor-pointer hover:text-blue-600 transition-colors" id="search-btn"></i>
            <div id="menu-btn" class="cursor-pointer hover:text-blue-600 transition-colors">
                <i class="fas fa-ellipsis-v"></i>
            </div>

            <!-- 3 Dot Menu Popup -->
            <div id="dot-menu"
                class="hidden absolute right-0 top-12 bg-white border border-gray-100 rounded-xl shadow-lg p-3 w-48 z-50 flex flex-col gap-1">
                <div
                    class="h-[44px] flex items-center px-3 hover:bg-gray-50 rounded-lg cursor-pointer text-sm font-medium text-gray-700">
                    New group</div>
                <div
                    class="h-[44px] flex items-center px-3 hover:bg-gray-50 rounded-lg cursor-pointer text-sm font-medium text-gray-700">
                    Starred</div>
                <div
                    class="h-[44px] flex items-center px-3 hover:bg-gray-50 rounded-lg cursor-pointer text-sm font-medium text-gray-700">
                    Read all</div>
                <a href="settings.html"
                    class="h-[44px] flex items-center px-3 hover:bg-gray-50 rounded-lg cursor-pointer text-sm font-medium text-gray-700">
                    Settings</a>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div id="search-container" class="bg-white px-4 pb-2 pt-1 transition-all hidden">
        <div class="relative group">
            <input type="text" id="user-search" placeholder="Search chats..."
                class="w-full px-12 py-3 bg-gray-100 border-none rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
            <i
                class="fas fa-search absolute left-4 top-1/2 -transform -translate-y-1/2 text-gray-400 group-focus-within:text-blue-600 transition-colors"></i>
        </div>
    </div>

    <!-- Tabs -->
    <div
        class="bg-white flex border-b border-gray-100 text-sm font-semibold uppercase tracking-wider text-gray-400 overflow-x-auto">
        <button class="flex-1 py-4 tab-active transition-all duration-300">Chats</button>
        <button class="flex-1 py-4 hover:text-blue-600 transition-all duration-300">Archived</button>
        <button class="flex-1 py-4 hover:text-blue-600 transition-all duration-300">Groups</button>
    </div>

    <!-- Chat List -->
    <main id="chat-list" class="flex-1 overflow-y-auto pb-24 bg-white divide-y divide-gray-50">
        <!-- Chat items will be injected here -->
        <div class="p-8 text-center text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Loading messages...</p>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button id="floating-plus" onclick="toggleSearch()"
        class="bg-blue-600 text-white rounded-full shadow-xl shadow-blue-200 hover:scale-105 transition-all flex items-center justify-center text-xl z-20">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <!-- Will be loaded from navbar.html -->
    </nav>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/home.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/notification.js"></script>
</body>

</html>
