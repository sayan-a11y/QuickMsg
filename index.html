<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Login / Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Auth Card -->
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-blue-600">QuickMsg</h1>
            <p class="text-gray-500 mt-2" id="auth-subtitle">Welcome back! Please login.</p>
        </div>

        <!-- Login / Signup Form -->
        <form id="auth-form" class="space-y-4">
            <!-- Signup Fields only (hidden initially) -->
            <div id="signup-fields" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1">Email</label>
                    <input type="email" id="email" placeholder="john@example.com" class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 ml-1">Username</label>
                <input type="text" id="username" placeholder="johndoe123" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 ml-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button type="submit" id="auth-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-semibold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                Login
            </button>
        </form>

        <div class="text-center text-sm text-gray-500">
            <p id="toggle-auth">Don't have an account? <span class="text-blue-600 font-semibold cursor-pointer" onclick="toggleAuth()">Sign up</span></p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
