<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Account Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #ffffff;
        }

        .row-item {
            height: 64px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .icon-gray {
            color: #8696a0;
            font-size: 24px;
            width: 32px;
            text-align: center;
        }

        .text-whatsapp-title {
            color: #111b21;
            font-size: 16px;
            font-weight: 500;
        }

        .text-whatsapp-subtitle {
            color: #667781;
            font-size: 13px;
        }
    </style>
</head>

<body class="flex flex-col h-screen max-w-[500px] mx-auto relative overflow-x-hidden transition-colors">

    <header class="bg-white sticky top-0 z-20 flex items-center px-4 justify-between transition-colors shadow-sm"
        style="height: 56px; border-bottom: 1px solid #eeeeee;">
        <div class="flex items-center space-x-6">
            <span class="material-icons text-gray-600 cursor-pointer"
                onclick="location.href='settings.html'">arrow_back</span>
            <h1 class="text-lg font-bold text-gray-800">Account</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-white">
        <!-- Security -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">verified_user</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Security notifications</h3>
            </div>
        </div>

        <!-- 2FA -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">security</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Two-step verification</h3>
            </div>
        </div>

        <!-- Change number -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">phone_android</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Change number</h3>
            </div>
        </div>

        <!-- Request account info -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">description</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Request account info</h3>
            </div>
        </div>

        <!-- Passkeys -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">fingerprint</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Passkeys</h3>
            </div>
        </div>

        <!-- Delete account -->
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons text-red-400">delete</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-red-500 font-medium">Delete account</h3>
            </div>
        </div>
    </main>

    <script>
        function applyTheme() {
            const isDark = localStorage.getItem('dark-mode') === 'true';
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }
        applyTheme();
    </script>
</body>

</html>
