<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Avatar Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #ffffff;
        }

        .row-item {
            height: 64px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .icon-gray {
            color: #8696a0;
            font-size: 24px;
            width: 32px;
            text-align: center;
        }

        .text-whatsapp-title {
            color: #111b21;
            font-size: 16px;
            font-weight: 500;
        }

        .text-whatsapp-subtitle {
            color: #667781;
            font-size: 13px;
        }
    </style>
</head>

<body class="flex flex-col h-screen max-w-[500px] mx-auto relative overflow-x-hidden transition-colors">

    <header class="bg-white sticky top-0 z-20 flex items-center px-4 justify-between transition-colors shadow-sm"
        style="height: 56px; border-bottom: 1px solid #eeeeee;">
        <div class="flex items-center space-x-6">
            <span class="material-icons text-gray-600 cursor-pointer"
                onclick="location.href='settings.html'">arrow_back</span>
            <h1 class="text-lg font-bold text-gray-800">Avatar</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-white">
        <div class="flex flex-col items-center py-10 space-y-4">
            <div class="w-32 h-32 bg-gray-100 rounded-full flex items-center justify-center text-gray-300">
                <span class="material-icons text-6xl">account_circle</span>
            </div>
            <p class="text-[14px] text-gray-500 text-center px-10">Express yourself with your own avatar. Create or edit
                your avatar to use it as a profile photo or stickers.</p>
            <button
                class="bg-[#00a884] text-white px-8 py-2 rounded-full font-bold shadow-md transform active:scale-95 transition-transform">Create
                Avatar</button>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">brush</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Edit avatar</h3>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">photo</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Profile photo from avatar</h3>
            </div>
        </div>
    </main>

    <script>
        function applyTheme() {
            const isDark = localStorage.getItem('dark-mode') === 'true';
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }
        applyTheme();
    </script>
</body>

</html>
