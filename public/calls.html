<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickMsg - Calls</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 flex flex-col h-screen max-w-md mx-auto relative shadow-2xl overflow-hidden">

    <!-- Header -->
    <header class="bg-white p-4 flex items-center justify-between border-b border-gray-100 sticky top-0 z-10">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">
                Q
            </div>
            <h1 class="text-xl font-bold text-gray-800">Calls</h1>
        </div>
        <div class="text-gray-500 text-lg">
            <i class="fas fa-search cursor-pointer hover:text-blue-600 transition-colors"></i>
        </div>
    </header>

    <!-- Calls List -->
    <main id="calls-list" class="flex-1 overflow-y-auto pb-24 bg-white divide-y divide-gray-50">
        <div class="p-8 text-center text-gray-400">
            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
            <p>Loading call history...</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <!-- Loaded from navbar.html -->
    </nav>

    <!-- Delete Confirmation Popup (Simple Modal) -->
    <div id="delete-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl">
            <div class="p-6 text-center">
                <h3 class="text-lg font-bold text-gray-800 mb-2">Delete call logo?</h3>
                <p class="text-sm text-gray-500">This will remove the call from your history.</p>
            </div>
            <div class="flex border-t border-gray-100">
                <button onclick="closeDeleteModal()" class="flex-1 py-4 text-sm font-semibold text-gray-500 hover:bg-gray-50 transition-colors">Cancel</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 text-sm font-semibold text-red-600 hover:bg-red-50 transition-colors border-l border-gray-100">Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/calls.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
