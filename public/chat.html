<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #messages-container {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
            background-attachment: fixed;
            background-color: rgba(255, 255, 255, 0.9);
            background-blend-mode: overlay;
        }
    </style>
</head>

<body class="bg-blue-50 flex flex-col h-screen max-w-md mx-auto relative shadow-2xl overflow-hidden">

    <!-- Header -->
    <header class="bg-white p-4 flex items-center justify-between border-b border-gray-100 z-10 shadow-sm">
        <div class="flex items-center space-x-3">
            <i class="fas fa-arrow-left text-gray-500 cursor-pointer p-2 hover:bg-gray-100 rounded-full transition-colors"
                onclick="history.back()"></i>
            <div class="flex items-center space-x-3 cursor-pointer">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg uppercase shadow-lg shadow-blue-200"
                    id="header-avatar">
                    ?
                </div>
                <div>
                    <h1 class="text-base font-bold text-gray-800 leading-none" id="header-name">Loading...</h1>
                    <p class="text-[10px] text-blue-500 font-semibold uppercase mt-0.5" id="header-status">Online</p>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase hidden" id="typing-indicator">Typing...
                    </p>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-1.5 text-gray-800 pr-1">
            <button onclick="startCall('video')"
                class="w-10 h-10 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center active:bg-gray-200 outline-none">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="6" width="14" height="12" rx="3.5" ry="3.5"></rect>
                    <path d="M16 10.5l5.5-4v11l-5.5-4"></path>
                </svg>
            </button>
            <button onclick="startCall('voice')"
                class="w-10 h-10 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center active:bg-gray-200 outline-none">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg>
            </button>
            <div class="relative">
                <button id="more-options-btn"
                    class="w-10 h-10 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center active:bg-gray-200 outline-none">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="5" r="2"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                        <circle cx="12" cy="19" r="2"></circle>
                    </svg>
                </button>
                <!-- More Options Menu -->
                <div id="more-options-menu"
                    class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 z-50 py-2 animate-slide-up origin-top-right">
                    <button
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Report</button>
                    <button
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Block</button>
                    <button onclick="handleMoreAction('clear')"
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Clear
                        chat</button>
                    <button
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Export
                        chat</button>
                    <button
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Add
                        shortcut</button>
                    <button
                        class="w-full text-left px-4 py-3 hover:bg-gray-50 text-[15px] text-gray-700 transition-colors">Add
                        to list</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Messages -->
    <main id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-opacity-5 relative pb-20">
        <!-- Messages will be injected here -->
    </main>

    <!-- Reply/Edit Preview -->
    <div id="action-preview"
        class="hidden bg-white/95 backdrop-blur p-3 border-t border-blue-100 flex items-center justify-between animate-slide-up sticky bottom-[76px] z-20">
        <div class="border-l-4 border-blue-500 pl-3 overflow-hidden">
            <p id="preview-title" class="text-[11px] font-bold text-blue-600 uppercase"></p>
            <p id="preview-text" class="text-xs text-gray-500 truncate mt-0.5"></p>
        </div>
        <i class="fas fa-times text-gray-400 p-2 cursor-pointer hover:text-red-500" onclick="cancelAction()"></i>
    </div>

    <!-- Emoji Box -->
    <div id="emojiBox"
        class="hidden absolute bottom-20 left-4 bg-white border border-gray-100 rounded-xl shadow-2xl p-3 z-50 grid grid-cols-6 gap-3 text-2xl select-none">
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😀</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😁</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😂</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">🤣</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😍</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😎</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😢</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">😡</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">👍</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">❤️</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">🔥</span>
        <span class="cursor-pointer hover:scale-125 transition-transform text-center">🎉</span>
    </div>

    <!-- Input -->
    <div class="bg-white p-4 border-t border-gray-100 flex items-center space-x-3 shadow-top relative z-40">
        <button id="emojiBtn" class="text-gray-400 hover:text-blue-600 transition-colors text-xl">
            <i class="far fa-smile"></i>
        </button>
        <div class="flex-1 relative group">
            <input type="text" id="message-input" placeholder="Type a message..."
                class="w-full px-5 py-3 bg-gray-100 border-none rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
            <input type="file" id="fileInput" class="hidden">
            <button id="attachBtn"
                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-blue-600 transition-colors cursor-pointer outline-none">
                <i class="fas fa-paperclip"></i>
            </button>
        </div>
        <button id="send-btn"
            class="w-12 h-12 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-200 hover:scale-105 transition-all flex items-center justify-center text-lg">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>


    </div>

    <!-- WhatsApp Style Delete Popup -->
    <div id="deletePopup"
        class="fixed inset-0 hidden bg-black/40 z-[120] flex items-center justify-center p-6 backdrop-blur-[1px]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-[300px] shadow-2xl animate-fade-in">
            <p class="text-[19px] font-medium text-gray-800 mb-6 font-sans flex items-center gap-2">
                <i class="fas fa-trash-alt text-gray-500 text-lg"></i> Delete message?
            </p>
            <div class="flex flex-col space-y-4 font-medium text-right items-end w-full pr-2">
                <button id="delAll"
                    class="text-emerald-700 font-bold active:opacity-50 transition-opacity w-full text-right py-1 tracking-wide">Delete
                    for everyone</button>
                <button id="delMe"
                    class="text-emerald-700 font-bold active:opacity-50 transition-opacity w-full text-right py-1 tracking-wide">Delete
                    for me</button>
                <button id="cancelDel"
                    class="text-emerald-700 font-bold active:opacity-50 transition-opacity w-full text-right py-1 mt-2 tracking-wide">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/webrtc.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script src="js/notification.js"></script>
</body>

</html>
