<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - App language</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #ffffff;
        }

        .row-item {
            height: 64px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .text-whatsapp-title {
            color: #111b21;
            font-size: 16px;
            font-weight: 500;
        }

        .text-whatsapp-subtitle {
            color: #667781;
            font-size: 13px;
        }
    </style>
</head>

<body class="flex flex-col h-screen max-w-[500px] mx-auto relative overflow-x-hidden transition-colors">

    <header class="bg-white sticky top-0 z-20 flex items-center px-4 justify-between transition-colors shadow-sm"
        style="height: 56px; border-bottom: 1px solid #eeeeee;">
        <div class="flex items-center space-x-6">
            <span class="material-icons text-gray-600 cursor-pointer"
                onclick="location.href='settings.html'">arrow_back</span>
            <h1 class="text-lg font-bold text-gray-800">App language</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-white">
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <input type="radio" checked name="lang" class="w-5 h-5 accent-[#00a884]">
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">English</h3>
                <p class="text-whatsapp-subtitle">(device's language)</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <input type="radio" name="lang" class="w-5 h-5 accent-[#00a884]">
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">हिन्दी</h3>
                <p class="text-whatsapp-subtitle">Hindi</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <input type="radio" name="lang" class="w-5 h-5 accent-[#00a884]">
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">मराठी</h3>
                <p class="text-whatsapp-subtitle">Marathi</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <input type="radio" name="lang" class="w-5 h-5 accent-[#00a884]">
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">ગુજરાતી</h3>
                <p class="text-whatsapp-subtitle">Gujarati</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <input type="radio" name="lang" class="w-5 h-5 accent-[#00a884]">
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Español</h3>
                <p class="text-whatsapp-subtitle">Spanish</p>
            </div>
        </div>
    </main>

    <script>
        function applyTheme() {
            const isDark = localStorage.getItem('dark-mode') === 'true';
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }
        applyTheme();
    </script>
</body>

</html>
