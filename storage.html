<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMsg - Storage and data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #ffffff;
        }

        .row-item {
            height: 64px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .icon-gray {
            color: #8696a0;
            font-size: 24px;
            width: 32px;
            text-align: center;
        }

        .text-whatsapp-title {
            color: #111b21;
            font-size: 16px;
            font-weight: 500;
        }

        .text-whatsapp-subtitle {
            color: #667781;
            font-size: 13px;
        }

        .section-title {
            color: #667781;
            font-size: 14px;
            font-weight: 600;
            padding: 16px 24px 8px;
        }
    </style>
</head>

<body class="flex flex-col h-screen max-w-[500px] mx-auto relative overflow-x-hidden transition-colors">

    <header class="bg-white sticky top-0 z-20 flex items-center px-4 justify-between transition-colors shadow-sm"
        style="height: 56px; border-bottom: 1px solid #eeeeee;">
        <div class="flex items-center space-x-6">
            <span class="material-icons text-gray-600 cursor-pointer"
                onclick="location.href='settings.html'">arrow_back</span>
            <h1 class="text-lg font-bold text-gray-800">Storage and data</h1>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-white">
        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer pt-4 h-auto pb-4">
            <span class="material-icons icon-gray">folder_open</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Manage storage</h3>
                <p class="text-whatsapp-subtitle">24.5 GB</p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <span class="material-icons icon-gray">trending_up</span>
            <div class="flex-1 flex flex-col justify-center h-full">
                <h3 class="text-whatsapp-title">Network usage</h3>
                <p class="text-whatsapp-subtitle">34.2 GB sent • 12.1 GB received</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <div class="flex-1 flex flex-col justify-center h-full pl-14">
                <h3 class="text-whatsapp-title">Use less data for calls</h3>
            </div>
            <label class="relative inline-flex items-center cursor-pointer pointer-events-none">
                <input type="checkbox" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-[#00a884]"></div>
            </label>
        </div>

        <h2 class="section-title">Media auto-download</h2>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <div class="flex-1 flex flex-col justify-center h-full pl-14">
                <h3 class="text-whatsapp-title">When using mobile data</h3>
                <p class="text-whatsapp-subtitle">Photos</p>
            </div>
        </div>

        <div class="row-item flex items-center px-6 gap-6 hover:bg-gray-50 cursor-pointer">
            <div class="flex-1 flex flex-col justify-center h-full pl-14">
                <h3 class="text-whatsapp-title">When connected on Wi-Fi</h3>
                <p class="text-whatsapp-subtitle">All media</p>
            </div>
        </div>
    </main>

    <script>
        function applyTheme() {
            const isDark = localStorage.getItem('dark-mode') === 'true';
            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }
        applyTheme();
    </script>
</body>

</html>
